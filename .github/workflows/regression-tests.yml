name: Regression Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  regression:
    name: Run regression test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run regression tests
        run: ./scripts/test-regression.sh
