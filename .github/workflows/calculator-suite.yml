name: Calculator Test Suite

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  calculator-suite:
    name: Run calculator test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run calculator test suite
        run: ./scripts/test-suite.sh
